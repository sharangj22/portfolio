<section id="education" class="section education-section" #educationSection>
  <!-- Decorative gradient orbs -->
  <div class="bg-gradient-orb education-orb-1"></div>
  <div class="bg-gradient-orb education-orb-2"></div>

  <div class="container">
    <div class="section-header" #sectionHeader>
      <span class="section-label">EDUCATION</span>
      <h2 class="section-title">Academic Background</h2>
    </div>

    <div class="education-content">
      <div class="glass-card education-card" #educationCard>
        <div class="education-card-inner">
          <div class="education-icon-wrapper">
            <div class="education-icon">
              <span class="grad-cap">🎓</span>
            </div>
          </div>

          <div class="education-details">
            <div class="education-degree-row">
              <h3 class="education-degree">Bachelor of Engineering</h3>
              <span class="education-period">2019 — 2023</span>
            </div>
            <p class="education-field">Electronics and Communication Engineering</p>
            <div class="education-meta">
              <div class="education-institution">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                  <path d="M6 12v5c3 3 10 3 12 0v-5"/>
                </svg>
                <span>Loyola - ICAM College of Engineering and Technology</span>
              </div>
              <div class="education-location">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
                  <circle cx="12" cy="10" r="3"/>
                </svg>
                <span>Chennai</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Decorative accent line -->
        <div class="card-accent-line"></div>
      </div>
    </div>
  </div>
</section>
