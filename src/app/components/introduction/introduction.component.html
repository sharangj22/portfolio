<section class="intro-section" id="introduction">
  <!-- Grid Pattern Overlay -->
  <div class="grid-overlay"></div>

  <!-- Gradient Orbs -->
  <div class="hero-orb orb-1"></div>
  <div class="hero-orb orb-2"></div>
  <div class="hero-orb orb-3"></div>

  <!-- Floating Particles -->
  <div class="float-particle p1"></div>
  <div class="float-particle p2"></div>
  <div class="float-particle p3"></div>
  <div class="float-particle p4"></div>
  <div class="float-particle p5"></div>
  <div class="float-particle p6"></div>

  <div class="intro-content">
    <!-- Greeting -->
    <p class="intro-greeting">Hello, I'm</p>

    <!-- Animated Name -->
    <h1 class="intro-name">
      <span
        *ngFor="let char of nameChars; let i = index"
        class="char"
        [class.space]="isSpace(char)"
      >{{ isSpace(char) ? '\u00A0' : char }}</span>
    </h1>

    <!-- Subtitle -->
    <p class="intro-subtitle">
      Software Developer <span class="divider">|</span>
      Full Stack <span class="divider">|</span>
      ERP &amp; AI Automation
    </p>

    <!-- Location Badge -->
    <div class="intro-location">
      <span class="location-icon">📍</span>
      <span>Chennai, India</span>
    </div>

    <!-- CTA Buttons -->
    <div class="intro-cta">
      <a class="btn btn-primary" href="assets/resume.pdf" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download Resume
      </a>
      <button class="btn btn-outline" (click)="scrollToContact()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        Get in Touch
      </button>
    </div>

    <!-- Social Links -->
    <div class="intro-socials">
      <a class="social-link" href="mailto:sharangonsalous@gmail.com" aria-label="Email" title="Email">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </a>
      <a class="social-link" href="https://linkedin.com/in/sharangonsalous" target="_blank" rel="noopener" aria-label="LinkedIn" title="LinkedIn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
          <rect x="2" y="9" width="4" height="12"/>
          <circle cx="4" cy="4" r="2"/>
        </svg>
      </a>
      <a class="social-link" href="tel:+919876543210" aria-label="Phone" title="Phone">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </a>
    </div>
  </div>

  <!-- Scroll Indicator -->
  <div class="scroll-indicator">
    <div class="scroll-mouse">
      <div class="scroll-dot"></div>
    </div>
    <span class="scroll-text">Scroll</span>
  </div>
</section>
